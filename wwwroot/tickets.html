<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIHelper | Ticket Management</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🎫 Ticket Management System</h1>
                <p><a href="/dashboard.html">← Back to Dashboard</a></p>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-section">
                <input type="text" id="ticketSearch" placeholder="Search tickets..." class="search-input">
                <select id="statusFilter" class="filter-select">
                    <option value="">All Status</option>
                    <option value="open">Open</option>
                    <option value="in-progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="closed">Closed</option>
                </select>
                <select id="branchFilter" class="filter-select">
                    <option value="">All Branches</option>
                </select>
            </div>
            <div class="action-buttons">
                <button onclick="refreshTickets()" class="secondary">🔄 Refresh</button>
                <button onclick="exportTickets()" class="secondary">📊 Export</button>
                <button onclick="window.location.href='/create-ticket.html'" class="primary">+ New Ticket</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="totalTickets">0</span>
                <span class="stat-label">Total Tickets</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="openTickets">0</span>
                <span class="stat-label">Open</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="inProgressTickets">0</span>
                <span class="stat-label">In Progress</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="resolvedTickets">0</span>
                <span class="stat-label">Resolved</span>
            </div>
        </div>

        <div class="tickets-container">
            <div class="tickets-table">
                <div class="table-header">
                    <div class="col-id">ID</div>
                    <div class="col-question">Question</div>
                    <div class="col-branch">Branch</div>
                    <div class="col-status">Status</div>
                    <div class="col-actions">Actions</div>
                </div>
                <div id="ticketsList" class="table-body">
                    <!-- Tickets will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Ticket Detail Modal -->
        <div id="ticketModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Ticket Details</h3>
                    <span class="modal-close" onclick="closeModal()">&times;</span>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Ticket details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="/navigation.js"></script>
    <script src="/tickets.js"></script>
</body>
</html>
